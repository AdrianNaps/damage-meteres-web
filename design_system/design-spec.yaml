meta:
  version: "1.0"
  name: "Details Design System"
  description: "Dark-themed WoW log analysis UI — tokens extracted from the live app"

tokens:
  colors:
    surface:
      root:     { $value: "#0a0b0f", $type: color }
      panel:    { $value: "#111318", $type: color }
      elevated: { $value: "#1a1c24", $type: color }
      hover:    { $value: "rgba(255, 255, 255, 0.04)", $type: color }
      active:   { $value: "rgba(255, 255, 255, 0.08)", $type: color }

    border:
      subtle:  { $value: "rgba(255, 255, 255, 0.06)", $type: color }
      default: { $value: "rgba(255, 255, 255, 0.10)", $type: color }

    text:
      primary:   { $value: "#f0f0f3", $type: color }
      secondary: { $value: "#8b8d98", $type: color }
      muted:     { $value: "#55565e", $type: color }

    accent:
      keyrun: { $value: "#d97706", $type: color }
      boss:   { $value: "#8b5cf6", $type: color }

    status:
      live: { $value: "#3b82f6", $type: color }
      kill: { $value: "#22c55e", $type: color }
      wipe: { $value: "#ef4444", $type: color }

    data:
      healing:     { $value: "#4ade80", $type: color }
      damage:      { $value: "#f87171", $type: color }
      killing-blow: { $value: "#fca5a5", $type: color }
      crit:        { $value: "#eab308", $type: color }
      group-avg:   { $value: "#f59e0b", $type: color }

    health:
      high:   { $value: "#22c55e", $type: color }
      medium: { $value: "#eab308", $type: color }
      low:    { $value: "#ef4444", $type: color }

    class:
      warrior:      { $value: "#C79C6E", $type: color }
      paladin:      { $value: "#F48CBA", $type: color }
      hunter:       { $value: "#AAD372", $type: color }
      rogue:        { $value: "#FFF468", $type: color }
      priest:       { $value: "#FFFFFF", $type: color }
      death-knight: { $value: "#C41E3A", $type: color }
      shaman:       { $value: "#0070DD", $type: color }
      mage:         { $value: "#3FC7EB", $type: color }
      warlock:      { $value: "#8788EE", $type: color }
      monk:         { $value: "#00FF96", $type: color }
      druid:        { $value: "#FF7C0A", $type: color }
      demon-hunter: { $value: "#A330C9", $type: color }
      evoker:       { $value: "#33937F", $type: color }
      unknown:      { $value: "#64748B", $type: color }

    overlay:
      backdrop: { $value: "rgba(0, 0, 0, 0.6)", $type: color }
      noise:    { $value: "0.025", $type: number }

  spacing:
    "1":  { $value: "1px",  $type: dimension }
    "2":  { $value: "2px",  $type: dimension }
    "3":  { $value: "3px",  $type: dimension }
    "4":  { $value: "4px",  $type: dimension }
    "5":  { $value: "5px",  $type: dimension }
    "6":  { $value: "6px",  $type: dimension }
    "8":  { $value: "8px",  $type: dimension }
    "12": { $value: "12px", $type: dimension }
    "14": { $value: "14px", $type: dimension }
    "16": { $value: "16px", $type: dimension }

  radii:
    sm:   { $value: "2px",   $type: dimension }
    md:   { $value: "3px",   $type: dimension }
    full: { $value: "50%",   $type: dimension }

  typography:
    family:
      sans: { $value: "Geist Sans, Geist, ui-sans-serif, system-ui, sans-serif", $type: fontFamily }
      mono: { $value: "Geist Mono, ui-monospace, monospace", $type: fontFamily }
    size:
      "9":  { $value: "9px",  $type: dimension }
      "10": { $value: "10px", $type: dimension }
      "11": { $value: "11px", $type: dimension }
      "12": { $value: "12px", $type: dimension }
      "13": { $value: "13px", $type: dimension }
      "14": { $value: "14px", $type: dimension }
      "15": { $value: "15px", $type: dimension }
      "20": { $value: "20px", $type: dimension }
    weight:
      normal:   { $value: 400, $type: fontWeight }
      medium:   { $value: 500, $type: fontWeight }
      semibold: { $value: 600, $type: fontWeight }
    heading:
      $value: { fontFamily: "{typography.family.sans}", fontWeight: 600, fontSize: "15px", lineHeight: "20px" }
      $type: typography
    body:
      $value: { fontFamily: "{typography.family.sans}", fontWeight: 400, fontSize: "13px", lineHeight: "20px" }
      $type: typography
    label:
      $value: { fontFamily: "{typography.family.sans}", fontWeight: 500, fontSize: "11px", lineHeight: "16px", letterSpacing: "0.04em" }
      $type: typography
    caption:
      $value: { fontFamily: "{typography.family.sans}", fontWeight: 400, fontSize: "10px", lineHeight: "14px" }
      $type: typography
    mono:
      $value: { fontFamily: "{typography.family.mono}", fontWeight: 400, fontSize: "12px", lineHeight: "18px" }
      $type: typography

  shadows:
    panel:
      $value: { offsetX: "-8px", offsetY: "0", blur: "32px", spread: "0", color: "rgba(0, 0, 0, 0.4)" }
      $type: shadow
    modal:
      $value: { offsetX: "0", offsetY: "16px", blur: "48px", spread: "0", color: "rgba(0, 0, 0, 0.5)" }
      $type: shadow
    text:
      $value: "0 1px 2px rgba(0, 0, 0, 0.85), 0 0 1px rgba(0, 0, 0, 0.9)"
      $type: shadow

  transitions:
    fast:
      $value: "0.1s"
      $type: duration
    normal:
      $value: "0.15s"
      $type: duration

  sizes:
    icon:      { $value: "18px", $type: dimension }
    row:       { $value: "32px", $type: dimension }
    scrollbar: { $value: "6px",  $type: dimension }

  column-widths:
    rank:     { $value: "24px",  $type: dimension }
    time:     { $value: "48px",  $type: dimension }
    percent:  { $value: "52px",  $type: dimension }
    total:    { $value: "64px",  $type: dimension }
    rate:     { $value: "72px",  $type: dimension }
    name:     { $value: "96px",  $type: dimension }
    source:   { $value: "112px", $type: dimension }

  opacity:
    row-alt:  { $value: 0.02, $type: number }
    bar-fill: { $value: 0.7,  $type: number }
    hp-fill:  { $value: 0.18, $type: number }

components:

  # ── Shared / Atomic ──────────────────────────────────────────────

  CloseButton:
    archetype: button
    category: "Actions"
    description: "Dismiss button used in panels and modals (× glyph)"

    slots:
      label: { accepts: [text], required: false }

    base:
      background: none
      border: none
      color: "{colors.text.muted}"
      cursor: pointer
      font-size: "{typography.size.20}"
      line-height: 1
      padding: "{spacing.4} {spacing.8}"
      transition: "color {transitions.normal}"

    variants:
      default:
        hover:
          color: "{colors.text.primary}"

    rules:
      - "Renders × character as content"

  SpellIcon:
    archetype: generic
    category: "Data"
    description: "Inline spell or ability icon with border treatment"

    base:
      width: "{sizes.icon}"
      height: "{sizes.icon}"
      border: { width: "1px", style: solid, color: "rgba(0, 0, 0, 0.7)" }
      border-radius: "{radii.sm}"
      background: "{colors.surface.hover}"
      overflow: hidden
      flex-shrink: 0

    rules:
      - "Hides entirely on image load error"

  StatusBadge:
    archetype: badge
    category: "Data"
    description: "Uppercase pill showing encounter outcome (KILL, WIPE, TIMED, DEPLETED)"

    base:
      font-size: "{typography.size.10}"
      font-weight: "{typography.weight.semibold}"
      letter-spacing: "0.06em"
      text-transform: uppercase
      line-height: "18px"
      padding: "{spacing.1} {spacing.6}"

    variants:
      kill:
        default:
          color: "{colors.status.kill}"
          background: "color-mix(in srgb, {colors.status.kill} 12%, transparent)"
          border: { width: "1px", style: solid, color: "color-mix(in srgb, {colors.status.kill} 25%, transparent)" }
      wipe:
        default:
          color: "{colors.status.wipe}"
          background: "color-mix(in srgb, {colors.status.wipe} 12%, transparent)"
          border: { width: "1px", style: solid, color: "color-mix(in srgb, {colors.status.wipe} 25%, transparent)" }

    rules:
      - "Color and background are derived from a single accent color via color-mix"
      - "Used for KILL, WIPE, TIMED, DEPLETED labels"

  ColumnHeader:
    archetype: generic
    category: "Data"
    description: "Uppercase column header row shared across meter, deaths, and recap views"

    base:
      display: flex
      align-items: center
      padding-x: "{spacing.12}"
      padding-bottom: "{spacing.6}"
      font-size: "{typography.size.10}"
      font-weight: "{typography.weight.medium}"
      text-transform: uppercase
      letter-spacing: "0.06em"
      color: "{colors.text.muted}"
      border-bottom: { width: "1px", style: solid, color: "{colors.border.subtle}" }

    sizes:
      lg:
        font-size: "{typography.size.11}"
        letter-spacing: "0.05em"

    rules:
      - "MeterView uses the lg size; DeathsView and DeathRecapPanel use the default"

  # ── Header / Banner ──────────────────────────────────────────────

  EncounterHeader:
    archetype: bar
    preview:
      file: client/src/components/EncounterHeader.tsx
      render: "<EncounterHeader />"
      export: EncounterHeader
    category: "Navigation"
    description: "Top bar showing encounter name, difficulty, status badge, connection indicator, and settings gear"

    slots:
      title:     { accepts: [text], required: true }
      subtitle:  { accepts: [text], required: false }
      badge:     { accepts: [StatusBadge], required: false }
      indicator: { accepts: [generic], required: false }
      action:    { accepts: [button], required: false }

    base:
      display: flex
      align-items: center
      justify-content: space-between
      padding-x: "{spacing.16}"
      padding-y: "10px"
      border-bottom: { width: "1px", style: solid, color: "{colors.border.default}" }
      background: transparent

    variants:
      disconnected:
        default:
          background: "rgba(239, 68, 68, 0.06)"

    rules:
      - "Title uses heading typography (15px, weight 600)"
      - "Subtitle (difficulty, pull count) uses body typography in text-secondary"
      - "Connection indicator is a 6×6 circle: green pulsing when connected, yellow when connecting, red when disconnected"
      - "Settings gear icon is 14×14, text-muted → text-primary on hover"

  LogsBanner:
    archetype: alert
    preview:
      file: client/src/components/LogsBanner.tsx
      render: "<LogsBanner />"
      export: LogsBanner
    category: "Feedback"
    description: "Error banner shown when the WoW logs folder is not found"

    slots:
      icon:    { accepts: [text], required: true }
      message: { accepts: [text], required: true }
      action:  { accepts: [button], required: false }

    base:
      display: flex
      align-items: center
      gap: "{spacing.8}"
      padding-x: "{spacing.16}"
      padding-y: "{spacing.8}"
      font-size: "{typography.size.12}"
      color: "{colors.text.primary}"
      background: "rgba(239, 68, 68, 0.08)"
      border-bottom: { width: "1px", style: solid, color: "color-mix(in srgb, {colors.status.wipe} 25%, transparent)" }

    rules:
      - "Warning icon (⚠) colored status-wipe"
      - "Path displayed in mono font, text-secondary"
      - "Action link colored status-live with underline"

  # ── Tabs / Toggles ──────────────────────────────────────────────

  TabButton:
    archetype: button
    category: "Navigation"
    description: "Individual tab used inside SegmentTabs — supports accent color underline"

    slots:
      label: { accepts: [text], required: true }

    base:
      display: flex
      align-items: center
      flex-shrink: 0
      background: transparent
      border: none
      border-bottom: { width: "2px", style: solid, color: transparent }
      margin-bottom: "-1px"
      white-space: nowrap
      cursor: pointer
      color: "{colors.text.secondary}"

    sizes:
      lg:
        padding: "{spacing.6} {spacing.12}"
        font-size: "{typography.size.12}"
      sm:
        padding: "{spacing.4} 10px"
        font-size: "{typography.size.11}"

    variants:
      active:
        default:
          color: "{colors.text.primary}"
          border-bottom-color: "dynamic accent color"
      inactive:
        hover:
          color: "{colors.text.primary}"

    rules:
      - "Accent color varies by segment type: {colors.accent.keyrun} (key runs), {colors.accent.boss} (boss sections), text-primary (standalone), text-secondary (segments)"
      - "Duration shown in mono font at opacity 0.4"
      - "Success ✓ uses status-kill, failure ✗ uses status-wipe"

  SegmentTabs:
    archetype: tabs
    preview:
      file: client/src/components/SegmentTabs.tsx
      render: "<SegmentTabs />"
      export: SegmentTabs
    category: "Navigation"
    description: "Two-tier horizontal tab bar — top tier for key runs / boss sections, bottom tier for individual segments"

    slots:
      top-tier:    { accepts: [TabButton], required: true }
      bottom-tier: { accepts: [TabButton], required: false }

    base:
      display: flex
      flex-direction: column
      border-bottom: { width: "1px", style: solid, color: "{colors.border.subtle}" }

    rules:
      - "Top tier: px-4 pt-2, uses lg TabButtons"
      - "Bottom tier: px-4 pt-0.5 pb-0.5, left-padded 28px, uses sm TabButtons"
      - "Both tiers scroll horizontally on overflow"

  MetricToggle:
    archetype: toggle
    category: "Actions"
    description: "Segmented button group for switching between Damage / Healing / Interrupts / Deaths"

    slots:
      options: { accepts: [button], required: true }

    base:
      display: inline-flex
      border: { width: "1px", style: solid, color: "{colors.border.default}" }
      overflow: hidden

    rules:
      - "Each option button: padding 4px 14px, font-size 12, weight 500"
      - "Active: bg-active + text-primary; Inactive: transparent + text-secondary"
      - "Hover (inactive): bg-hover + text-primary"
      - "Buttons separated by 1px border-default divider"
      - "Transition: background and color at {transitions.normal}"

  SegmentedControl:
    archetype: toggle
    category: "Actions"
    description: "Small segmented toggle for Spells / Targets view inside BreakdownPanel"

    slots:
      options: { accepts: [button], required: true }

    base:
      display: inline-flex
      border: { width: "1px", style: solid, color: "{colors.border.default}" }

    rules:
      - "Each option: padding 3px 12px, font-size 11, weight 500, uppercase, letter-spacing 0.04em"
      - "Active: bg-active + text-primary; Inactive: transparent + text-secondary"
      - "Hover (inactive): bg-hover + text-primary"
      - "Transition: background and color at {transitions.normal}"

  # ── Data Rows ────────────────────────────────────────────────────

  DataRow:
    archetype: generic
    category: "Data"
    description: "Base row used in meter tables — provides height, hover state, and class-color left border"

    base:
      display: flex
      align-items: center
      height: "{sizes.row}"
      padding-right: "{spacing.12}"
      cursor: pointer
      overflow: hidden
      transition: "background {transitions.fast}"
      border-left: { width: "3px", style: solid, color: transparent }

    variants:
      default:
        hover:
          background: "{colors.surface.hover}"

    rules:
      - "Border-left color is set dynamically to the player's class color"

  PlayerRow:
    archetype: generic
    preview:
      file: client/src/components/PlayerRow.tsx
      render: "<PlayerRow player={{ name: 'Thrall', class: 8, specId: 263, damage: { total: 150000, spells: {}, targets: {} }, healing: { total: 0, spells: {} }, interrupts: { total: 3 }, dps: 5000, hps: 0 }} rank={1} topValue={5000} totalValue={150000} metric=\"damage\" onClick={() => {}} />"
      export: PlayerRow
    category: "Data"
    description: "Meter row showing rank, spec icon, player name, total, rate (DPS/HPS), and percentage with a colored background bar"
    extends: DataRow

    slots:
      rank:    { accepts: [text], required: true }
      icon:    { accepts: [SpellIcon], required: false }
      name:    { accepts: [text], required: true }
      total:   { accepts: [text], required: true }
      rate:    { accepts: [text], required: true }
      percent: { accepts: [text], required: true }

    base:
      position: relative

    rules:
      - "Background bar: absolute positioned, width = percentage of top value, colored by class color at {opacity.bar-fill}, border-radius 0 2px 2px 0"
      - "All text is white (#fff) with text shadow for readability over the bar"
      - "Rank: width {column-widths.rank}, font-size 11, mono, centered, padding-left 6"
      - "Spec icon: 18×18 with 1px dark border, border-radius 2, margin-right 6"
      - "Name: flex-1, truncated, font-size 13, weight 500"
      - "Total: width {column-widths.total}, right-aligned, font-size 12, mono"
      - "Rate: width {column-widths.rate}, right-aligned, font-size 13, weight 600, mono"
      - "Percent: width {column-widths.percent}, right-aligned, font-size 11, mono"

  DeathRow:
    archetype: generic
    category: "Data"
    description: "Row in the deaths list — rank, player name, time, killing blow spell, and overkill amount"
    extends: DataRow

    slots:
      rank:    { accepts: [text], required: true }
      player:  { accepts: [text], required: true }
      time:    { accepts: [text], required: true }
      spell:   { accepts: [text], required: true }
      overkill: { accepts: [text], required: false }

    rules:
      - "Rank: width {column-widths.rank}, font-size 11, mono, text-muted, centered, padding-left 6"
      - "Player: width {column-widths.name}, truncated, font-size 13, weight 500, colored by class"
      - "Time: width {column-widths.time}, right-aligned, font-size 12, mono, text-secondary"
      - "Killing Blow: flex-1, truncated, padding-left 16, font-size 12, text-secondary"
      - "Overkill: width {column-widths.total}, right-aligned, font-size 12, mono, text-muted (red if > 0)"

  RecapRow:
    archetype: generic
    category: "Data"
    description: "Single event row in the death recap timeline — shows time, spell, source, amount, and HP bar background"

    base:
      position: relative
      display: flex
      align-items: center
      gap: "{spacing.8}"
      padding: "{spacing.4} {spacing.16}"
      font-size: "{typography.size.12}"
      overflow: hidden
      border-bottom: { width: "1px", style: solid, color: "{colors.border.subtle}" }
      border-left: { width: "3px", style: solid, color: transparent }
      background: transparent

    variants:
      killing-blow:
        default:
          border-left-color: "{colors.status.wipe}"
          background: "rgba(239, 68, 68, 0.06)"

    rules:
      - "HP bar: absolute fill, width = HP%, color = health.high/medium/low based on threshold (>50/>25), opacity {opacity.hp-fill}"
      - "Time: width {column-widths.time}, mono, text-muted"
      - "Spell: flex-1, truncated; killing-blow text is {colors.data.killing-blow} weight 500, else text-primary weight 400"
      - "Killing blow badge: font-size 9, weight 600, uppercase, letter-spacing 0.08em, status-wipe"
      - "Source: width {column-widths.source}, right-aligned, text-secondary if friendly else text-muted"
      - "Amount: width {column-widths.total}, right-aligned, weight 600, mono; damage = {colors.data.damage}, heal = {colors.data.healing}"

  # ── Tables ───────────────────────────────────────────────────────

  DataTable:
    archetype: table
    category: "Data"
    description: "Base table used for spell breakdowns and target lists — collapsed borders, striped rows, hover"

    base:
      width: "100%"
      border-collapse: collapse

    rules:
      - "Header cells: font-size 10, weight 500, uppercase, letter-spacing 0.06em, text-muted, padding 6px 0, border-bottom 1px border-default"
      - "Body cells: padding 5px 0, font-size 12, border-bottom 1px border-subtle"
      - "Odd rows: background rgba(255,255,255,0.02)"
      - "Row hover: background {colors.surface.hover}"
      - "Mono values use font-family mono"

  DamageSpellTable:
    archetype: table
    preview:
      file: client/src/components/SpellTable.tsx
      render: "<DamageSpellTable spells={{ '12345': { spellId: '12345', spellName: 'Fireball', total: 50000, hitCount: 100, critCount: 25, normalMin: 200, normalMax: 1200, absorbed: 500 } }} />"
      export: DamageSpellTable
    category: "Data"
    description: "Spell breakdown for damage — columns: Spell, Total, Hits, Crit%, Min, Max, Absorb"
    extends: DataTable

    slots:
      rows: { accepts: [generic], required: true }

    rules:
      - "Spell column: flex, includes SpellIcon + name"
      - "Total: text-primary, weight 600, mono, right-aligned"
      - "Hits: text-secondary, mono, right-aligned"
      - "Crit%: colored {colors.data.crit}, mono, right-aligned"
      - "Min, Max, Absorb: text-muted, mono, right-aligned"

  HealSpellTable:
    archetype: table
    preview:
      file: client/src/components/SpellTable.tsx
      render: "<HealSpellTable spells={{ '54321': { spellId: '54321', spellName: 'Holy Light', total: 80000, hitCount: 150, critCount: 45, overheal: 10000 } }} />"
      export: HealSpellTable
    category: "Data"
    description: "Spell breakdown for healing — columns: Spell, Total, Hits, Crit%, Overheal%"
    extends: DataTable

    slots:
      rows: { accepts: [generic], required: true }

    rules:
      - "Same column styling as DamageSpellTable"
      - "Overheal%: text-muted, mono, right-aligned"

  InterruptSpellTable:
    archetype: table
    preview:
      file: client/src/components/SpellTable.tsx
      render: "<InterruptSpellTable spells={{ '99999': { spellId: '99999', spellName: 'Counterspell', count: 12 } }} heading=\"Interrupts\" />"
      export: InterruptSpellTable
    category: "Data"
    description: "Interrupt breakdown — columns: Ability, Count, %"
    extends: DataTable

    slots:
      heading: { accepts: [text], required: false }
      rows:    { accepts: [generic], required: true }

    rules:
      - "Optional heading displayed above table"
      - "Count: text-primary, weight 600, mono, right-aligned"
      - "%: text-muted, mono, right-aligned"
      - "Shows centered 'None' message in text-muted if empty"

  TargetTable:
    archetype: table
    preview:
      file: client/src/components/TargetTable.tsx
      render: "<TargetTable targets={{ 'Rashanan': { targetName: 'Rashanan', total: 250000 } }} totalDamage={250000} duration={60} onSelect={() => {}} />"
      export: TargetTable
    category: "Data"
    description: "Clickable list of damage targets with total, DPS, and percentage"
    extends: DataTable

    slots:
      rows: { accepts: [generic], required: true }

    rules:
      - "Rows are clickable (cursor pointer) — opens TargetDrillDown"
      - "Target: text-primary"
      - "Total: text-primary, weight 600, mono, right-aligned"
      - "DPS: text-secondary, mono, right-aligned"
      - "%: text-muted, mono, right-aligned"

  # ── Panels / Modals ─────────────────────────────────────────────

  SlidePanel:
    archetype: modal
    category: "Layout"
    description: "Right-anchored slide-in panel with backdrop, used for breakdowns and death recaps"

    slots:
      header:  { accepts: [any], required: true }
      close:   { accepts: [CloseButton], required: true }
      content: { accepts: [any], required: true }

    base:
      position: fixed
      top: 0
      right: 0
      height: "100%"
      width: "100%"
      max-width: "32rem"
      z-index: 50
      display: flex
      flex-direction: column
      background: "{colors.surface.elevated}"
      border-left: { width: "1px", style: solid, color: "{colors.border.default}" }
      box-shadow: "{shadows.panel}"

    rules:
      - "Backdrop: fixed inset-0, z-index 40, background {colors.overlay.backdrop}, click-to-close"
      - "Header: flex, justify-between, px-16 py-12, border-bottom 1px border-default"
      - "Header has a 4px left border in the player's class color"
      - "Title: weight 600, font-size 15, colored by class"
      - "Subtitle: font-size 12, mono, text-secondary, margin-top 2"

  BreakdownPanel:
    archetype: modal
    preview:
      file: client/src/components/BreakdownPanel.tsx
      render: "<BreakdownPanel />"
      export: BreakdownPanel
    category: "Layout"
    description: "Player spell/target breakdown panel — extends SlidePanel with a segmented control and table content"
    extends: SlidePanel

    slots:
      header:  { accepts: [any], required: true }
      close:   { accepts: [CloseButton], required: true }
      toggle:  { accepts: [SegmentedControl], required: false }
      content: { accepts: [DamageSpellTable, HealSpellTable, InterruptSpellTable, TargetTable, TargetDrillDown], required: true }

    rules:
      - "SegmentedControl shown only for damage metric (Spells / Targets toggle)"
      - "Content area: flex-1, overflow-y auto, px-16 py-12"
      - "Subtitle shows formatted total and DPS/HPS or interrupt count"

  DeathRecapPanel:
    archetype: modal
    preview:
      file: client/src/components/DeathRecapPanel.tsx
      render: "<DeathRecapPanel />"
      export: DeathRecapPanel
    category: "Layout"
    description: "Chronological death recap panel — extends SlidePanel with column headers and RecapRows"
    extends: SlidePanel

    slots:
      header:  { accepts: [any], required: true }
      close:   { accepts: [CloseButton], required: true }
      columns: { accepts: [ColumnHeader], required: true }
      content: { accepts: [RecapRow], required: true }

    rules:
      - "Subtitle shows death timestamp and killing blow spell + source"
      - "Column headers: Time (48px), Spell (flex-1), Source (112px right), Amount (64px right)"
      - "Content area: flex-1, overflow-y auto"

  SettingsModal:
    archetype: modal
    preview:
      file: client/src/components/SettingsModal.tsx
      render: "<SettingsModal />"
      export: SettingsModal
    category: "Layout"
    description: "Centered dialog for configuring the WoW logs folder path"

    slots:
      header:  { accepts: [text], required: true }
      close:   { accepts: [CloseButton], required: true }
      content: { accepts: [any], required: true }

    base:
      position: fixed
      left: "50%"
      top: "50%"
      transform: "translate(-50%, -50%)"
      z-index: 50
      display: flex
      flex-direction: column
      width: "min(520px, calc(100vw - 32px))"
      background: "{colors.surface.elevated}"
      border: { width: "1px", style: solid, color: "{colors.border.default}" }
      box-shadow: "{shadows.modal}"

    rules:
      - "Backdrop: fixed inset-0, z-index 40, background {colors.overlay.backdrop}, click-to-close"
      - "Header: flex, justify-between, px-16 py-12, border-bottom 1px border-default"
      - "Title: weight 600, font-size 14, text-primary"
      - "Content: px-16 py-16, flex column, gap 8"
      - "Path input: mono font-size 12, bg-surface, border-subtle, padding 6px 8px, text-ellipsis"
      - "Change button: bg-surface, border-default, font-size 12, weight 500, padding 6px 12px; hover bg-hover"
      - "Error text: font-size 11, status-wipe, margin-top 4"

  # ── Views ────────────────────────────────────────────────────────

  MeterView:
    archetype: generic
    preview:
      file: client/src/components/MeterView.tsx
      render: "<MeterView />"
      export: MeterView
    category: "Layout"
    description: "Main dashboard area — metric toggle, column headers, and scrollable list of PlayerRows"

    slots:
      toggle:  { accepts: [MetricToggle], required: true }
      headers: { accepts: [ColumnHeader], required: true }
      rows:    { accepts: [PlayerRow, DeathsView], required: true }

    base:
      display: flex
      flex-direction: column
      flex: 1
      min-height: 0

    rules:
      - "Toggle bar: flex, items-center, justify-between, px-12 pt-8 pb-6"
      - "Column headers use the lg ColumnHeader size"
      - "Columns: # (24px), Player (flex-1), Total (64px), DPS/HPS (72px), % (52px)"
      - "Row list: flex-1, overflow-y auto"
      - "Loading state: centered text-muted with pulse-dot animation"

  DeathsView:
    archetype: generic
    preview:
      file: client/src/components/DeathsView.tsx
      render: "<DeathsView />"
      export: DeathsView
    category: "Layout"
    description: "Deaths list view — column headers and scrollable DeathRows"

    slots:
      headers: { accepts: [ColumnHeader], required: true }
      rows:    { accepts: [DeathRow], required: true }

    base:
      display: flex
      flex-direction: column
      flex: 1
      min-height: 0

    rules:
      - "Columns: # (24px), Player (96px), Time (48px), Killing Blow (flex-1), Overkill (64px)"
      - "Clicking a DeathRow opens the DeathRecapPanel"

  TargetDrillDown:
    archetype: generic
    preview:
      file: client/src/components/TargetDrillDown.tsx
      render: "<TargetDrillDown detail={{ targetName: 'Rashanan', total: 250000, sources: [{ sourceName: 'Thrall', total: 250000 }] }} onBack={() => {}} />"
      export: TargetDrillDown
    category: "Data"
    description: "Detail view inside BreakdownPanel showing per-source damage to a specific target"

    slots:
      back:  { accepts: [button], required: true }
      title: { accepts: [text], required: true }
      table: { accepts: [DataTable], required: true }

    rules:
      - "Back button: no background/border, font-size 12, text-secondary, hover text-primary, transition color 0.15s; text '← Targets'"
      - "Title: font-size 14, weight 600, text-primary; total shown inline in mono text-secondary, margin-left 8"
      - "Margin-bottom 12 between title and table"
      - "Table columns: Source, Total (mono weight 600 right), % (mono text-muted right)"

  # ── Graph ─────────────────────────────────────────────────────────

  GraphContainer:
    archetype: generic
    category: "Data"
    description: "Canvas-based graph area that sits above the main content. Renders DPS/HPS line graphs or vertical bar graphs depending on the active metric."

    slots:
      header: { accepts: [any], required: true }
      canvas: { accepts: [generic], required: true }

    base:
      flex-shrink: 0
      padding: "{spacing.8} {spacing.16} {spacing.4}"
      border-bottom: { width: "1px", style: solid, color: "{colors.border.subtle}" }
      background: "{colors.surface.panel}"

    rules:
      - "Header row: flex, space-between, margin-bottom 4px"
      - "Title: label typography (10px, weight 500, uppercase, letter-spacing 0.06em), text-muted"
      - "Legend: flex row, gap 12px; each item has an 8×2px color swatch + 10px text-secondary label"
      - "Canvas: width 100%, height 120px, block display"
      - "Line graph mode (Damage, Healing): smooth cubic bezier curves per player, class-colored, 1.5px stroke, 0.8 opacity"
      - "Group average line: {colors.data.group-avg}, 2px stroke, dashed (6px dash, 4px gap), 0.9 opacity, drawn on top of player lines"
      - "Bar graph mode (Deaths, Interrupts): vertical grouped bars per time bucket, class-colored, 0.85 opacity, rounded top corners"
      - "Y-axis: mono 9px, text-muted, right-aligned labels at 4 grid steps"
      - "X-axis: mono 9px, text-muted, centered time labels (m:ss format)"
      - "Grid lines: rgba(255,255,255,0.04), 1px"
      - "Hides entirely when no data is available for the metric"
      - "Redraws on resize and when the inline drill panel opens/closes (after transition completes)"

globals:
  body:
    background: "{colors.surface.root}"
    color: "{colors.text.primary}"
    font-family: "{typography.family.sans}"
    font-feature-settings: '"tnum"'
    -webkit-font-smoothing: antialiased
  scrollbar:
    width: "{sizes.scrollbar}"
    track: transparent
    thumb: "{colors.border.default}"
    thumb-hover: "rgba(255, 255, 255, 0.16)"
    thumb-radius: "{radii.md}"
  noise-overlay:
    opacity: "{colors.overlay.noise}"
    z-index: 9999
    pointer-events: none
  selection:
    background: "{colors.surface.active}"

layouts: {}
